# STUN/TURN server configuration for Lificosm WebRTC
# This configuration is for the coturn server bundled in the Docker image

# STUN/TURN server listening port
listening-port=${TURN_SERVER_PORT:3478}
tls-listening-port=5349

# Specify the external IP
# Replace with your server's public IP in production
# external-ip=1.2.3.4

# Relay ports range (for TURN allocation)
min-port=49152
max-port=65535

# Realm name
realm=${TURN_SERVER_REALM:lificosm.com}

# Authentication
# For production, use a real database backend
# This file-based auth is for demonstration only
userdb=/etc/turnuserdb.conf

# Use long-term credential mechanism
lt-cred-mech

# Disable fingerprinting
# no-software-attribute

# Enable verbose logging for debugging
# verbose

# Use authentication secret (for REST API authentication)
# Replace with a secure secret in production
use-auth-secret
static-auth-secret=${TURN_SECRET:changeit}

# Specify listening interfaces
listening-ip=0.0.0.0

# Enable both TCP and UDP
no-tcp-relay

# Logging
log-file=/var/log/turnserver.log
# Adjust log level (0-10, where 0 is minimal logging)
# For production, consider using 0 or 1
log-level=1

# TLS configuration (if using secure connections)
# cert=/etc/ssl/certs/cert.pem
# pkey=/etc/ssl/private/key.pem

# Enable WebSocket transport for TURN
# web-admin-port=8080
# web-admin-listen=0.0.0.0

# Enable CLI for remote administration (not recommended for production)
# cli-port=5766
# cli-password=changeme

# Enable Prometheus metrics
# prometheus
# prometheus-port=9641

# Rate limiting to prevent abuse
total-quota=100
max-bps=0